#include ./theme.conf


# BEGIN_KITTY_THEME
# Broadcast
include current-theme.conf
# END_KITTY_THEME
enable_audio_bell no
font_family      Monospace
font_size        11.0

enabled_layouts tall:bias=56, stack

# Switch to the previous window
map ctrl+tab next_window

# Switch to the previous tab with Ctrl+Shift+Tab
map ctrl+shift+tab previous_window

map ctrl+shift+f combine : show_scrollback : send_text normal,application /

map ctrl+shift+x toggle_layout stack
startup_session ~/.config/kitty/startup_session 


map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0

# Make Shift+Enter insert a newline in apps like Claude Code, even inside tmux.
# Sends ESC+CR (== Alt/Option+Enter), which passes through tmux cleanly instead
# of relying on the kitty keyboard protocol (which tmux does not forward).
map shift+enter send_text all \x1b\r

# Herdr prefix: emit the kitty-keyboard-protocol encoding for super+a
# (CSI 97 ; 9 u) so Herdr receives cmd+a even without protocol negotiation.
# Herdr's prefix is set to "cmd+a" in ~/.config/herdr/config.toml.
map cmd+a send_text all \x1b[97;9u

map ctrl+shift+z move_window left
map ctrl+shift+r clear_terminal reset active
cursor_trail 400
#clipboard_control write-clipboard write-primary read-primary-ask read-clipboard
#scrollback_pager nvim -u NONE -R -M -c 'lua require("kitty+page")(INPUT_LINE_NUMBER)' -
#scrollback_pager less -I --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER 
#clipboard_control write-clipboard write-primary read-primary-ask read-clipboard




scrollback_pager $HOME/.config/kitty/nvim-pager.sh INPUT_LINE_NUMBER




text_fg_override_threshold 2

# macos_option_as_meta yes # old ?
macos_option_as_alt yes

copy_on_select a1
mouse_map middle release ungrabbed paste_from_buffer a1


scrollback_lines 99999
