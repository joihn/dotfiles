##### Prefix ###################################################################
# C-a like GNU screen. C-a C-a sends a literal C-a to the shell.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reduce Esc delay (important for vim/nvim)
set -s escape-time 10

##### Terminal & colors ########################################################
# Extended keys: let tmux tell Shift+Enter apart from plain Enter so Claude Code
# can insert a newline. `extended-keys on` forwards the sequence to apps that
# request it; the `extkeys` feature flag tells tmux the OUTER terminal (kitty =
# xterm-kitty) accepts these sequences — without it tmux won't negotiate them.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g default-terminal "tmux-256color"
# Cursor built-in terminal is xterm-based; use wildcard to match variants.
set -ga terminal-features ',xterm*:RGB,tmux-256color:RGB,kitty:RGB'
# Fallback for apps expecting the older truecolor capability.
set -ga terminal-overrides ',*:Tc'

##### Behavior #################################################################
set -g history-limit 50000
set -g focus-events on
set -g mouse on
setw -g mode-keys vi

# Stay attached when the current window is closed
set -g detach-on-destroy off

# Forward OSC 52 (kitten clipboard) to the outer terminal.
# allow-passthrough (tmux >= 3.3) lets Claude Code's desktop notifications and
# progress bar reach kitty instead of being swallowed by tmux.
set -g allow-passthrough on
set -g set-clipboard on
set -ga terminal-overrides ',xterm*:Ms=\E]52;%p1%s;%p2%s\007,kitty:Ms=\E]52;%p1%s;%p2%s\007'

# Index from 1 (cosmetic preference)
set -g base-index 1

##### Status bar ###############################################################
set -g status-interval 10
set -g status-position bottom
set -g status-bg black
set -g status-fg white
set -g status-left  "#[bold]#S "
set -g status-right "#[fg=colour245]%H:%M  #(whoami)@#H"
set -g status-left-length 30
set -g status-right-length 60

##### Key bindings #############################################################
# d  → detach  (tmux default, kept as-is)
# $  → rename session
# s  → list/switch sessions
# r  → reload this config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Copy-mode: vi-style selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Mouse wheel: scroll 1 line per notch (tmux default is 5, which feels too fast)
bind -T copy-mode-vi WheelUpPane   select-pane \; send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send -X -N 1 scroll-down

# Copy tmux buffer to system clipboard
bind y run-shell 'tmux save-buffer - | (kitten clipboard || xclip -sel clip || xsel --clipboard --input)'

##### iTerm2 compatibility #####################################################
setw -g aggressive-resize off

##### Misc #####################################################################
set -g clock-mode-style 24
set -g bell-action none
set -g visual-activity off
