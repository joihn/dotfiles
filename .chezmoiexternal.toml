[".oh-my-zsh"]
    type = "archive"
    url = "https://github.com/ohmyzsh/ohmyzsh/archive/master.tar.gz"
    
    stripComponents = 1
    refreshPeriod = "168h"

# Plugins are fetched as archives (HTTPS tarballs) rather than git-repo, so they
# need no `git` binary — a fresh machine can apply before git is installed.
# refreshPeriod still controls how often they re-download.
[".oh-my-zsh/custom/plugins/fast-syntax-highlighting"]
    type = "archive"
    url = "https://github.com/zdharma-continuum/fast-syntax-highlighting/archive/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "504h"
[".oh-my-zsh/custom/plugins/zsh-vi-mode"]
    type = "archive"
    url = "https://github.com/joihn/zsh-vi-mode/archive/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "504h"
[".oh-my-zsh/custom/plugins/conda-zsh-completion"]
    type = "archive"
    url = "https://github.com/conda-incubator/conda-zsh-completion/archive/main.tar.gz"
    stripComponents = 1
    refreshPeriod = "504h"
[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-autosuggestions/archive/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "504h"

# powerlevel10k prompt theme. Fetched as an archive (same rationale as the
# plugins: no git binary needed) into the oh-my-zsh custom themes dir so
# `ZSH_THEME="powerlevel10k/powerlevel10k"` in .zshrc resolves it.
[".oh-my-zsh/custom/themes/powerlevel10k"]
    type = "archive"
    url = "https://github.com/romkatv/powerlevel10k/archive/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "504h"

# kitten: single static binary, used for clipboard passthrough over SSH.
# Linux only — on macOS kitty (and its bundled kitten) comes from `cask "kitty"`
# in run_onchange_install-brew-packages.sh.
{{ if eq .chezmoi.os "linux" -}}
[".local/bin/kitten"]
    type = "file"
    refreshPeriod = "504h"
    executable = true
    {{- if or (eq .chezmoi.arch "amd64") (eq .chezmoi.arch "x86_64") }}
        url = "https://github.com/kovidgoyal/kitty/releases/latest/download/kitten-linux-amd64"
    {{- else if or (eq .chezmoi.arch "arm64") (eq .chezmoi.arch "aarch64") }}
        url = "https://github.com/kovidgoyal/kitty/releases/latest/download/kitten-linux-arm64"
    {{- else if eq .chezmoi.arch "arm" }}
        url = "https://github.com/kovidgoyal/kitty/releases/latest/download/kitten-linux-arm"
    {{- end }}
{{ end -}}

